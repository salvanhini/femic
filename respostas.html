<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEMIC Resposta Paciente v2.2</title>
<style>
body{font-family:Arial;margin:20px;}
input{padding:10px;width:100%;margin-top:5px;}
button{padding:10px;margin-top:10px;}
</style>
</head>
<body>

<h2>Resposta do Paciente</h2>

<label>Nome</label>
<input id="name">

<label>WhatsApp</label>
<input id="whatsapp" placeholder="(99) 99999-9999" maxlength="15" oninput="formatWhatsapp(this)">

<button onclick="save()">Enviar</button>

<script>
function formatWhatsapp(input){
  let v = input.value.replace(/\D/g,'');
  if(v.length>11)v=v.slice(0,11);
  if(v.length>6){
    input.value=`(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  }else if(v.length>2){
    input.value=`(${v.slice(0,2)}) ${v.slice(2)}`;
  }else if(v.length>0){
    input.value=`(${v}`;
  }
}

function save(){
 alert("Simulação de envio OK");
}
</script>

</body>
</html>
