<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>FEMIC — Lembrete por Voz</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:linear-gradient(180deg,#0b3c6f 0%,#0d5ea8 40%,#1fb6e9 100%);
      color:#fff;
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:24px 16px;
      -webkit-tap-highlight-color:transparent;
    }
    h1{
      font-size:1.1rem;
      font-weight:600;
      opacity:.9;
      margin-bottom:4px;
    }
    .subtitle{
      font-size:.82rem;
      opacity:.7;
      margin-bottom:32px;
      text-align:center;
    }
    .mic-btn{
      width:120px;
      height:120px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.3);
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:#fff;
      font-size:48px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all .2s ease;
      box-shadow:0 8px 32px rgba(0,0,0,.2);
      margin-bottom:16px;
    }
    .mic-btn:active{
      transform:scale(.95);
    }
    .mic-btn.is-recording{
      background:rgba(239,68,68,.8);
      border-color:rgba(239,68,68,.5);
      animation:pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}
      50%{box-shadow:0 0 0 16px rgba(239,68,68,0)}
    }
    .status{
      font-size:.9rem;
      opacity:.8;
      min-height:24px;
      text-align:center;
      margin-bottom:24px;
    }
    .transcript{
      width:100%;
      max-width:360px;
      min-height:60px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.2);
      border-radius:16px;
      padding:14px;
      color:#fff;
      font-size:.95rem;
      line-height:1.4;
      resize:none;
      outline:none;
      margin-bottom:12px;
    }
    .transcript::placeholder{
      color:rgba(255,255,255,.4);
    }
    .actions{
      display:flex;
      gap:10px;
      width:100%;
      max-width:360px;
      margin-bottom:32px;
    }
    .actions button{
      flex:1;
      padding:14px;
      border-radius:14px;
      border:none;
      font-size:.95rem;
      font-weight:700;
      cursor:pointer;
      transition:all .15s ease;
    }
    .actions button:active{
      transform:scale(.97);
    }
    .btn-send{
      background:#fff;
      color:#0b3c6f;
    }
    .btn-send:disabled{
      opacity:.4;
    }
    .btn-clear{
      background:rgba(255,255,255,.15);
      color:#fff;
      border:1px solid rgba(255,255,255,.2);
    }
    .tasks-section{
      width:100%;
      max-width:360px;
    }
    .tasks-title{
      font-size:.8rem;
      text-transform:uppercase;
      letter-spacing:.05em;
      opacity:.6;
      margin-bottom:10px;
    }
    .task-item{
      background:rgba(255,255,255,.1);
      border-radius:12px;
      padding:12px;
      margin-bottom:8px;
      font-size:.85rem;
    }
    .task-item strong{
      display:block;
      margin-bottom:4px;
    }
    .task-item span{
      opacity:.7;
      font-size:.8rem;
    }
    .task-type{
      display:inline-block;
      background:rgba(255,255,255,.2);
      padding:2px 8px;
      border-radius:6px;
      font-size:.7rem;
      font-weight:700;
      text-transform:uppercase;
      margin-right:6px;
    }
    .empty{
      opacity:.4;
      font-size:.85rem;
      text-align:center;
      padding:20px;
    }
    .toast{
      position:fixed;
      bottom:24px;
      left:50%;
      transform:translateX(-50%) translateY(100px);
      background:#fff;
      color:#0b3c6f;
      padding:12px 20px;
      border-radius:14px;
      font-size:.9rem;
      font-weight:600;
      box-shadow:0 8px 24px rgba(0,0,0,.2);
      transition:transform .3s ease;
      z-index:999;
    }
    .toast.show{
      transform:translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <h1>FEMIC</h1>
  <p class="subtitle">Toque no microfone e fale seu lembrete</p>

  <button class="mic-btn" id="micBtn" type="button">🎤</button>
  <p class="status" id="status">Toque para começar</p>

  <textarea class="transcript" id="transcript" placeholder="O texto transcrito aparece aqui..." rows="3"></textarea>

  <div class="actions">
    <button class="btn-clear" id="clearBtn" type="button">Limpar</button>
    <button class="btn-send" id="sendBtn" type="button" disabled>Enviar</button>
  </div>

  <section class="tasks-section">
    <div class="tasks-title">Recentes</div>
    <div id="taskList"></div>
  </section>

  <div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';

  var TASKS_KEY = 'femic_ai_tasks_v1';
  var micBtn = document.getElementById('micBtn');
  var statusEl = document.getElementById('status');
  var transcriptEl = document.getElementById('transcript');
  var sendBtn = document.getElementById('sendBtn');
  var clearBtn = document.getElementById('clearBtn');
  var taskListEl = document.getElementById('taskList');
  var toastEl = document.getElementById('toast');

  var recognition = null;
  var listening = false;
  var finalText = '';

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 3000);
  }

  function norm(v){
    return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
  }

  function detectAction(text){
    var n = norm(text);
    if(/cancel|desmarc|nao vou|nao pod/.test(n)) return 'cancelamento';
    if(/remarc|reagen|remanej|mudar|trocar|alterar/.test(n)) return 'remarcacao';
    return 'marcacao';
  }

  function detectShift(text){
    var n = norm(text);
    if(n.indexOf('manha')!==-1) return 'manha';
    if(n.indexOf('tarde')!==-1) return 'tarde';
    if(n.indexOf('noite')!==-1) return 'noite';
    return '';
  }

  function detectDates(text){
    var n = norm(text);
    var dates = [];
    var dias = {domingo:0,segund:1,terc:2,quarta:3,quint:4,sext:5,sabad:6};
    var hoje = new Date();
    for(var name in dias){
      if(n.indexOf(name)!==-1){
        var dow = dias[name];
        var d = new Date(hoje);
        var diff = (dow - d.getDay() + 7) % 7;
        if(diff===0) diff = 7;
        d.setDate(d.getDate() + diff);
        dates.push(d.toISOString().slice(0,10));
      }
    }
    var match = n.match(/(\d{1,2})\s*\/\s*(\d{1,2})/);
    if(match){
      var day = parseInt(match[1],10), month = parseInt(match[2],10);
      var y = month < hoje.getMonth()+1 ? hoje.getFullYear()+1 : hoje.getFullYear();
      dates.push(y + '-' + String(month).padStart(2,'0') + '-' + String(day).padStart(2,'0'));
    }
    if(n.indexOf('hoje')!==-1) dates.push(hoje.toISOString().slice(0,10));
    if(n.indexOf('amanha')!==-1){
      var am = new Date(hoje);
      am.setDate(am.getDate()+1);
      dates.push(am.toISOString().slice(0,10));
    }
    return dates;
  }

  function readTasks(){
    try{
      var raw = JSON.parse(localStorage.getItem(TASKS_KEY)||'[]');
      return Array.isArray(raw) ? raw : [];
    }catch(e){ return []; }
  }

  function saveTasks(list){
    localStorage.setItem(TASKS_KEY, JSON.stringify(list));
  }

  function makeTaskId(){
    return 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  }

  function taskTypeLabel(t){
    return {marcacao:'Marcação',remarcacao:'Remarcação',cancelamento:'Cancelamento'}[t]||'Outro';
  }

  function fmtDate(ds){
    if(!ds) return '';
    var p = ds.split('-');
    return p[2]+'/'+p[1]+'/'+p[0];
  }

  function createTask(text){
    var action = detectAction(text);
    var shift = detectShift(text);
    var dates = detectDates(text);
    var task = {
      id: makeTaskId(),
      title: taskTypeLabel(action) + ' · Lembrete por voz',
      type: action,
      status: 'aberta',
      priority: 'normal',
      patient_id: '',
      patient_name: '',
      service_id: '',
      service_name: '',
      phone: '',
      origin: 'voice_mobile',
      requested_action: action,
      notes: text,
      suggested_slots: [],
      candidates: [],
      parsed_shift: shift,
      parsed_dates: dates,
      needs_review: true,
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString(),
      completed_at: null
    };
    var list = readTasks();
    list.unshift(task);
    saveTasks(list);
    return task;
  }

  function renderTasks(){
    var list = readTasks().filter(function(t){
      return t.origin === 'voice_mobile' || t.origin === 'chrome_extension';
    }).slice(0, 10);
    if(!list.length){
      taskListEl.innerHTML = '<div class="empty">Nenhum lembrete ainda</div>';
      return;
    }
    taskListEl.innerHTML = list.map(function(t){
      var ago = Math.round((Date.now() - new Date(t.created_at).getTime()) / 60000);
      var timeLabel = ago < 1 ? 'agora' : ago < 60 ? ago + ' min atrás' : Math.round(ago/60) + 'h atrás';
      return '<div class="task-item">' +
        '<strong><span class="task-type">' + taskTypeLabel(t.type) + '</span>' + esc(t.title) + '</strong>' +
        '<span>' + esc(t.notes).slice(0,80) + (t.notes.length>80?'...':'') + ' · ' + timeLabel + '</span>' +
      '</div>';
    }).join('');
  }

  function esc(v){
    return String(v||'').replace(/[&<>"']/g,function(m){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
    });
  }

  function startListening(){
    var Ctor = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!Ctor){
      showToast('Microfone não disponível neste navegador.');
      return;
    }
    if(listening){
      stopListening();
      return;
    }
    finalText = '';
    transcriptEl.value = '';
    sendBtn.disabled = true;
    recognition = new Ctor();
    recognition.lang = 'pt-BR';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.onstart = function(){
      listening = true;
      micBtn.classList.add('is-recording');
      micBtn.textContent = '⏹';
      statusEl.textContent = 'Ouvindo... Fale agora';
    };
    recognition.onresult = function(event){
      var interim = '';
      for(var i = event.resultIndex; i < event.results.length; i++){
        if(event.results[i].isFinal) finalText += event.results[i][0].transcript;
        else interim += event.results[i][0].transcript;
      }
      transcriptEl.value = finalText + interim;
      if(finalText.trim()) sendBtn.disabled = false;
    };
    recognition.onerror = function(){
      stopListening();
      statusEl.textContent = 'Falha no microfone';
    };
    recognition.onend = function(){
      if(listening){
        listening = false;
        micBtn.classList.remove('is-recording');
        micBtn.textContent = '🎤';
        if(finalText.trim()){
          statusEl.textContent = 'Pronto para enviar';
        } else {
          statusEl.textContent = 'Nada captado. Toque para tentar novamente.';
        }
      }
    };
    recognition.start();
  }

  function stopListening(){
    if(recognition && listening){
      try{ recognition.stop(); }catch(e){}
    }
    listening = false;
    micBtn.classList.remove('is-recording');
    micBtn.textContent = '🎤';
  }

  function sendTask(){
    var text = transcriptEl.value.trim();
    if(!text){
      showToast('Nada para enviar.');
      return;
    }
    var task = createTask(text);
    showToast(taskTypeLabel(task.type) + ' criado com sucesso!');
    transcriptEl.value = '';
    finalText = '';
    sendBtn.disabled = true;
    statusEl.textContent = 'Toque para novo lembrete';
    renderTasks();
  }

  function clearTask(){
    transcriptEl.value = '';
    finalText = '';
    sendBtn.disabled = true;
    statusEl.textContent = 'Toque para começar';
    stopListening();
  }

  micBtn.addEventListener('click', startListening);
  sendBtn.addEventListener('click', sendTask);
  clearBtn.addEventListener('click', clearTask);

  transcriptEl.addEventListener('input', function(){
    sendBtn.disabled = !transcriptEl.value.trim();
  });

  renderTasks();
})();
</script>
</body>
</html>
